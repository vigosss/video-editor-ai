# ==========================================
# electron-builder 打包配置
# ==========================================

appId: com.vigosss.video-editor-ai
productName: 老兵AI智剪
copyright: Copyright © 2024 vigosss

# 目录配置
directories:
  output: out
  buildResources: build

# 启用 asar 打包
asar: true

# 将原生模块从 asar 中解包，确保 .node 二进制文件可正常加载
asarUnpack:
  - "node_modules/better-sqlite3/**/*"

# 需要打包的文件
files:
  - dist-electron/**/*
  - package.json
  # 排除 FFmpeg npm 包（通过 extraResources 单独打包二进制）
  - "!node_modules/@ffmpeg-installer/**/*"
  - "!node_modules/ffprobe-static/**/*"

# 额外资源：FFmpeg 和 Whisper CLI 二进制文件
extraResources:
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"
  - from: resources/whisper
    to: whisper
    filter:
      - "**/*"

# 原生模块自动重建
npmRebuild: true

# ==========================================
# Windows 配置
# ==========================================
win:
  icon: build/favicon.ico
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装器配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/favicon.ico
  uninstallerIcon: build/favicon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 老兵AI智剪

# ==========================================
# 发布配置（GitHub Releases）
# ==========================================
publish:
  provider: github
  owner: vigosss
  repo: video-editor-ai